<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coffee UI Animation</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Poppins", sans-serif;
}

body {
  height: 100vh;
  overflow: hidden;
  background: radial-gradient(circle at 30% 30%, #8b5a2b, #3e1f0f);
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ondas */
body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: repeating-radial-gradient(
    circle,
    rgba(255,255,255,0.05) 0px,
    rgba(255,255,255,0.05) 20px,
    transparent 20px,
    transparent 60px
  );
  animation: wave 12s linear infinite;
}

@keyframes wave {
  to { transform: rotate(360deg); }
}

/* LOADER */
.loader {
  position: absolute;
  z-index: 10;
}

.bean {
  width: 70px;
  height: 100px;
  background: #3b1d0a;
  border-radius: 50%;
  position: relative;
  overflow: hidden;
}

.bean::before {
  content: "";
  position: absolute;
  width: 10px;
  height: 100%;
  background: #1a0d05;
  left: 50%;
  transform: translateX(-50%);
}

/* crema animada */
.cream {
  position: absolute;
  width: 100%;
  height: 0%;
  background: #f5e6d3;
  bottom: 0;
  animation: fill 2s ease forwards;
}

@keyframes fill {
  0% { height: 0; }
  100% { height: 100%; }
}

/* MAIN UI */
.main {
  opacity: 0;
  transform: scale(0.7);
  transition: 0.8s ease;
}

.main.show {
  opacity: 1;
  transform: scale(1);
}

/* contenedor tipo app */
.container {
  width: 320px;
  padding: 20px;
  border-radius: 20px;
  background: #5a2d0c;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}

/* titulo */
.title {
  color: white;
  font-size: 20px;
  margin-bottom: 15px;
}

/* cafés */
.coffees {
  display: flex;
  justify-content: space-between;
}

/* tarjeta café */
.card {
  width: 80px;
  height: 130px;
  background: #fff;
  border-radius: 15px;
  position: relative;
  overflow: hidden;

  transform: translateY(150px);
  opacity: 0;
  animation: rise 0.8s ease forwards;
}

.card:nth-child(1) { animation-delay: 0.3s; }
.card:nth-child(2) { animation-delay: 0.5s; }
.card:nth-child(3) { animation-delay: 0.7s; }

@keyframes rise {
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

/* líquido */
.liquid {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 65%;
  background: #6b3e1d;
}

/* espuma */
.foam {
  position: absolute;
  top: 25%;
  width: 100%;
  height: 20%;
  background: #f5e6d3;
  border-radius: 50%;
}

/* nombre */
.name {
  position: absolute;
  bottom: 5px;
  width: 100%;
  text-align: center;
  font-size: 12px;
}

</style>
</head>

<body>

<!-- LOADING -->
<div class="loader" id="loader">
  <div class="bean">
    <div class="cream"></div>
  </div>
</div>

<!-- UI FINAL -->
<div class="main" id="main">
  <div class="container">
    <div class="title">Coffee Menu</div>

    <div class="coffees">

      <div class="card">
        <div class="foam"></div>
        <div class="liquid"></div>
        <div class="name">Latte</div>
      </div>

      <div class="card">
        <div class="foam"></div>
        <div class="liquid"></div>
        <div class="name">Mocha</div>
      </div>

      <div class="card">
        <div class="foam"></div>
        <div class="liquid"></div>
        <div class="name">Espresso</div>
      </div>

    </div>
  </div>
</div>

<script>
setTimeout(() => {
  document.getElementById("loader").style.opacity = "0";

  setTimeout(() => {
    document.getElementById("loader").style.display = "none";
    document.getElementById("main").classList.add("show");
  }, 500);

}, 2000);
</script>

</body>
</html>
