<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coffee Animation</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  /* Fondo marrón con ondas */
  background: radial-gradient(circle at 30% 30%, #8b5a2b, #3e1f0f);
  overflow: hidden;
}

/* ondas suaves */
body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: repeating-radial-gradient(
    circle,
    rgba(255,255,255,0.05) 0px,
    rgba(255,255,255,0.05) 20px,
    transparent 20px,
    transparent 60px
  );
  animation: wave 12s linear infinite;
}

@keyframes wave {
  0% { transform: translate(-10%, -10%) rotate(0deg); }
  100% { transform: translate(-10%, -10%) rotate(360deg); }
}

/* Card central */
.card {
  width: 300px;
  height: 180px;
  background: #5a2d0c;
  border-radius: 12px;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  z-index: 2;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* grano */
.bean {
  width: 40px;
  height: 60px;
  background: #3b1d0a;
  border-radius: 50%;
  position: relative;
  overflow: hidden;
}

/* línea del grano */
.bean::before {
  content: "";
  position: absolute;
  width: 8px;
  height: 100%;
  background: #1a0d05;
  left: 50%;
  transform: translateX(-50%);
  border-radius: 50%;
}

/* crema animada */
.cream {
  position: absolute;
  width: 100%;
  height: 0%;
  background: #f5e6d3;
  bottom: 0;
  animation: fill 2s ease forwards;
}

@keyframes fill {
  0% { height: 0%; }
  50% { height: 120%; }
  100% { height: 100%; }
}

/* efecto de apertura */
.split {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
}

.split div {
  flex: 1;
  background: transparent;
  animation: open 2s ease forwards;
}

.split div:first-child {
  border-right: 2px solid #1a0d05;
}

@keyframes open {
  0% { transform: translateX(0); }
  100% { transform: translateX(var(--dir)); }
}

.left {
  --dir: -10px;
}

.right {
  --dir: 10px;
}

</style>
</head>

<body>

<div class="card">
  <div class="bean">
    <div class="cream"></div>

    <div class="split">
      <div class="left"></div>
      <div class="right"></div>
    </div>
  </div>
</div>

</body>
</html>
