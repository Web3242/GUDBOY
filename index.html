<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coffee Animation Pro</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: sans-serif;
}

body {
  height: 100vh;
  overflow: hidden;
  background: radial-gradient(circle at 30% 30%, #8b5a2b, #3e1f0f);
  display: flex;
  justify-content: center;
  align-items: center;
}

/* FONDO ONDAS */
body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: repeating-radial-gradient(
    circle,
    rgba(255,255,255,0.05) 0px,
    rgba(255,255,255,0.05) 20px,
    transparent 20px,
    transparent 60px
  );
  animation: wave 12s linear infinite;
}

@keyframes wave {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* LOADING */
.loader {
  position: absolute;
  z-index: 5;
}

.bean {
  width: 50px;
  height: 70px;
  background: #3b1d0a;
  border-radius: 50%;
  position: relative;
  overflow: hidden;
}

.bean::before {
  content: "";
  position: absolute;
  width: 8px;
  height: 100%;
  background: #1a0d05;
  left: 50%;
  transform: translateX(-50%);
}

.cream {
  position: absolute;
  width: 100%;
  height: 0%;
  background: #f5e6d3;
  bottom: 0;
  animation: fill 2s ease forwards;
}

@keyframes fill {
  0% { height: 0; }
  100% { height: 100%; }
}

/* CONTENIDO PRINCIPAL */
.main {
  opacity: 0;
  transform: scale(0.8);
  transition: 0.8s ease;
  z-index: 2;
}

/* cuando aparece */
.main.show {
  opacity: 1;
  transform: scale(1);
}

/* CAFÉS */
.coffees {
  display: flex;
  gap: 30px;
}

/* cada café */
.coffee {
  width: 80px;
  height: 120px;
  background: #fff;
  border-radius: 10px;
  position: relative;
  transform: translateY(200px) scale(0.5);
  opacity: 0;
  animation: rise 0.8s ease forwards;
}

.coffee:nth-child(1) { animation-delay: 0.2s; }
.coffee:nth-child(2) { animation-delay: 0.4s; }
.coffee:nth-child(3) { animation-delay: 0.6s; }

@keyframes rise {
  to {
    transform: translateY(0) scale(1);
    opacity: 1;
  }
}

/* líquido café */
.liquid {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 70%;
  background: #6b3e1d;
  border-radius: 0 0 10px 10px;
}

/* espuma */
.foam {
  position: absolute;
  top: 20%;
  width: 100%;
  height: 20%;
  background: #f5e6d3;
  border-radius: 50%;
}

/* sombra */
.shadow {
  position: absolute;
  bottom: -10px;
  width: 100%;
  height: 10px;
  background: rgba(0,0,0,0.3);
  border-radius: 50%;
  filter: blur(5px);
}

</style>
</head>

<body>

<!-- LOADING -->
<div class="loader" id="loader">
  <div class="bean">
    <div class="cream"></div>
  </div>
</div>

<!-- CONTENIDO -->
<div class="main" id="main">
  <div class="coffees">

    <div class="coffee">
      <div class="foam"></div>
      <div class="liquid"></div>
      <div class="shadow"></div>
    </div>

    <div class="coffee">
      <div class="foam"></div>
      <div class="liquid"></div>
      <div class="shadow"></div>
    </div>

    <div class="coffee">
      <div class="foam"></div>
      <div class="liquid"></div>
      <div class="shadow"></div>
    </div>

  </div>
</div>

<script>
setTimeout(() => {
  document.getElementById("loader").style.display = "none";
  document.getElementById("main").classList.add("show");
}, 2000);
</script>

</body>
</html>
