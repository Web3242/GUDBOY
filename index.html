<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gud Boy Burger | The Real Smash House</title>
    
    <!-- Fuentes: Bebas Neue, Montserrat, Permanent Marker -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700;900&family=Permanent+Marker&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React y Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            background-color: #F5E6CA;
        }
        .font-handwriting {
            font-family: 'Permanent Marker', cursive;
        }
        h1, h2, h3, h4, .font-black {
            font-family: 'Bebas Neue', cursive;
            letter-spacing: 0em; 
        }
        html {
            scroll-behavior: smooth;
        }
        /* Textura de puntos estilo retro */
        .bg-dots {
            background-image: radial-gradient(#000 1.5px, transparent 0);
            background-size: 15px 15px;
        }
        /* Personalización de la barra de desplazamiento */
        ::-webkit-scrollbar {
            width: 12px;
        }
        ::-webkit-scrollbar-track {
            background: #1A1A1A;
        }
        ::-webkit-scrollbar-thumb {
            background: #CE2029;
            border: 3px solid #1A1A1A;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Componente de Iconos SVG
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                ShoppingBag: (
                    <>
                        <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/>
                        <line x1="3" x2="21" y1="6" y2="6"/>
                        <path d="M16 10a4 4 0 0 1-8 0"/>
                    </>
                ),
                X: (
                    <>
                        <path d="M18 6 6 18"/>
                        <path d="m6 6 12 12"/>
                    </>
                ),
                Instagram: (
                    <>
                        <rect width="20" height="20" x="2" y="2" rx="5" ry="5"/>
                        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
                        <line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/>
                    </>
                ),
                MapPin: (
                    <>
                        <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/>
                        <circle cx="12" cy="10" r="3"/>
                    </>
                ),
                Plus: (
                    <>
                        <path d="M5 12h14"/>
                        <path d="M12 5v14"/>
                    </>
                ),
                Minus: <path d="M5 12h14"/>,
                Trash2: (
                    <>
                        <path d="M3 6h18"/>
                        <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
                        <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
                        <line x1="10" x2="10" y1="11" y2="17"/>
                        <line x1="14" x2="14" y1="11" y2="17"/>
                    </>
                ),
                Flame: <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>,
                Star: <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>,
                ChevronRight: <path d="m9 18 6-6-6-6"/>,
                Navigation: <polygon points="3 11 22 2 13 21 11 13 3 11"/>,
                Truck: (
                    <>
                        <path d="M10 17h4M2 9h13v8H2zM15 9h5l2 2v6h-7z"/>
                        <circle cx="7" cy="17" r="2"/>
                        <circle cx="17" cy="17" r="2"/>
                    </>
                )
            };

            return (
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width={size}
                    height={size}
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    strokeWidth="2"
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    className={className}
                >
                    {icons[name] || null}
                </svg>
            );
        };

        const App = () => {
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [activeCategory, setActiveCategory] = useState('BURGERS');

            const menuItems = {
                BURGERS: [
                    { id: 1, name: 'WHOPPER SMASH', price: 18.00, desc: 'Doble carne, cheddar fundido, cebolla picada y nuestra salsa secreta GB.', note: 'La más pedida' },
                    { id: 2, name: 'CHURRI BURGER', price: 20.00, desc: 'La clásica de la casa con mayo de chimichurri y papas al hilo crujientes.', note: 'Sabor local' },
                    { id: 3, name: 'JACK DANIELS', price: 22.00, desc: 'Cebolla caramelizada en reducción de Jack, tocino ahumado y doble queso.', note: '¡Dulce y salada!' },
                    { id: 4, name: 'LA GUD BOY', price: 25.00, desc: 'Triple smash, aros de cebolla, BBQ artesanal y el alma de Comas.', note: 'Solo para valientes' },
                ],
                BEBIDAS: [
                    { id: 5, name: 'CHICHA MORADA', price: 6.00, desc: 'Nuestra chicha artesanal de la casa, bien helada.' },
                    { id: 6, name: 'BEBIDA DE MARACUYÁ', price: 6.00, desc: 'Refrescante maracuyá 100% natural.' },
                ]
            };

            const addToCart = (item) => {
                setCart(prev => {
                    const exists = prev.find(i => i.id === item.id);
                    if (exists) return prev.map(i => i.id === item.id ? { ...i, qty: i.qty + 1 } : i);
                    return [...prev, { ...item, qty: 1 }];
                });
                setIsCartOpen(true);
            };

            const updateQty = (id, delta) => {
                setCart(prev => prev.map(i => i.id === id ? { ...i, qty: Math.max(1, i.qty + delta) } : i));
            };

            const removeItem = (id) => setCart(prev => prev.filter(i => i.id !== id));
            const cartTotal = cart.reduce((acc, curr) => acc + (curr.price * curr.qty), 0);

            const handleConfirmOrder = () => {
                if (cart.length === 0) return;
                
                const itemsText = cart.map(item => `*${item.qty}x* ${item.name} (S/ ${(item.price * item.qty).toFixed(2)})`).join('%0A');
                const message = `Hola Gud Boy! 🍔 Quisiera realizar un pedido:%0A%0A${itemsText}%0A%0A*Total: S/ ${cartTotal.toFixed(2)}*%0A%0AGracias!`;
                
                // Redirección dinámica al WhatsApp con el mensaje predeterminado
                const whatsappApiUrl = `https://api.whatsapp.com/send?phone=51936306561&text=${message}`;
                window.open(whatsappApiUrl, '_blank');
            };

            const googleMapsUrl = "https://www.google.com/maps/place/Gud+Boy+Burger/@-11.9370188,-77.0633622,17z/data=!3m1!4b1!4m6!3m5!1s0x9105d1cc14b159df:0x55972506c8193ae3!8m2!3d-11.9370241!4d-77.0607873!16s%2Fg%2F11lnp0w2qv?entry=ttu";
            const whatsappDirectLink = "https://api.whatsapp.com/message/PVIE3CAZH7ORH1?autoload=1&app_absent=0&utm_source=ig";

            return (
                <div className="min-h-screen selection:bg-red-600 selection:text-white pb-20">
                    
                    {/* BARRA DE NAVEGACIÓN - Tamaño de fuentes aumentado para 'La Carta' y 'Visítanos' */}
                    <nav className="sticky top-0 w-full z-50 bg-[#1A1A1A] text-white py-4 px-6 md:px-12 flex justify-between items-center border-b-4 border-black">
                        <div className="flex items-center space-x-4">
                            <img 
                                src="Sin título.png" 
                                alt="Logo Gud Boy" 
                                className="w-12 h-12 rounded-full border-2 border-[#CE2029] object-cover"
                            />
                            <div className="font-black text-3xl tracking-normal uppercase leading-none italic text-white">
                                GUD BOY<span className="text-[#CE2029]">.</span>
                            </div>
                        </div>
                        <div className="flex items-center space-x-6 md:space-x-12 uppercase font-black text-sm tracking-[0.2em]">
                            <a href="#carta" className="hover:text-[#CE2029] transition-colors">La Carta</a>
                            <a href="#visitanos" className="hover:text-[#CE2029] transition-colors">Visítanos</a>
                            <button onClick={() => setIsCartOpen(true)} className="bg-[#CE2029] px-4 py-2 flex items-center space-x-2 rounded-sm transform -rotate-1 hover:rotate-0 transition-transform text-white text-center">
                                <Icon name="ShoppingBag" size={18} />
                                <span className="text-sm tracking-tighter font-black ml-1">S/ {cartTotal.toFixed(2)}</span>
                            </button>
                        </div>
                    </nav>

                    {/* SECCIÓN HERO */}
                    <section className="max-w-7xl mx-auto px-4 pt-12 md:pt-24 grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
                        <div className="relative space-y-8 order-2 lg:order-1">
                            <div className="absolute -top-12 left-6 md:left-2 w-24 h-24 md:w-32 md:h-32 bg-yellow-400 rounded-full border-4 border-black flex items-center justify-center text-center p-2 transform -rotate-12 z-20 shadow-xl">
                                <span className="font-handwriting text-black text-sm md:text-lg leading-tight tracking-normal">¡Desde <br/> Comas! 🇵🇪</span>
                            </div>

                            <h1 className="text-7xl md:text-[10rem] font-black uppercase italic leading-[0.85] tracking-normal text-black">
                                LA <span className="text-[#CE2029]">REAL</span> <br/> SMASH<br/>HOUSE
                            </h1>
                            
                            <div className="max-w-md">
                                <p className="text-lg md:text-xl font-bold uppercase leading-tight tracking-normal">
                                    Carne de verdad, pan artesanal y ese toque rebelde que solo encuentras en el Retablo. No somos fast food, somos comida real.
                                </p>
                                <div className="mt-8 flex flex-col sm:flex-row gap-4">
                                    <a href="#carta" className="bg-black text-white px-10 py-5 font-black text-xl uppercase italic transform hover:scale-105 transition-all shadow-[6px_6px_0_#CE2029] text-center text-white">
                                        VER LA CARTA
                                    </a>
                                </div>
                            </div>
                        </div>

                        <div className="relative order-1 lg:order-2 flex justify-center">
                            <div className="relative w-full max-w-lg">
                                <div className="aspect-square bg-gray-200 border-8 border-black rounded-3xl overflow-hidden shadow-[20px_20px_0_rgba(0,0,0,0.1)] relative group">
                                    <img 
                                        src="https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?q=80&w=1000&auto=format&fit=crop" 
                                        alt="Burger" 
                                        className="w-full h-full object-cover grayscale-[20%] group-hover:grayscale-0 transition-all duration-500"
                                    />
                                    <div className="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                                    <div className="absolute bottom-6 left-6 text-white text-white">
                                        <span className="bg-[#CE2029] px-2 py-1 font-black text-xs uppercase mb-2 block w-fit italic">Receta Original</span>
                                        <h2 className="text-4xl font-black uppercase italic tracking-normal text-white">Whopper Smash</h2>
                                    </div>
                                </div>
                                <div className="absolute -bottom-6 -right-6 md:-right-12 bg-white border-4 border-black p-4 transform rotate-6 max-w-[200px] shadow-xl">
                                    <p className="font-handwriting text-black text-lg leading-none tracking-normal text-black">"El pan brioche es otro nivel..."</p>
                                    <div className="flex text-yellow-500 mt-2">
                                        {[1,2,3,4,5].map(i => <Icon key={i} name="Star" size={14} className="text-yellow-500 fill-current" />)}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* SECCIÓN DE LA CARTA - Cambio de Piqueos a Bebidas */}
                    <section id="carta" className="max-w-7xl mx-auto px-4 pt-32 pb-20">
                        <div className="flex flex-col md:flex-row justify-between items-end mb-16 gap-8 text-black">
                            <div>
                                <h2 className="text-6xl md:text-8xl font-black uppercase italic leading-none tracking-normal text-black">
                                    NUESTRA <span className="text-[#CE2029]">SELECCIÓN</span>
                                </h2>
                                <p className="font-handwriting text-2xl text-gray-600 mt-2 tracking-normal text-black">Pide una y entenderás el hype.</p>
                            </div>
                            <div className="flex bg-black p-1 rounded-sm">
                                {Object.keys(menuItems).map(cat => (
                                    <button 
                                        key={cat}
                                        onClick={() => setActiveCategory(cat)}
                                        className={`px-8 py-3 font-black text-sm uppercase tracking-widest transition-all ${activeCategory === cat ? 'bg-white text-black' : 'bg-transparent text-white'}`}
                                    >
                                        {cat}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-px bg-black border-4 border-black overflow-hidden shadow-[12px_12px_0_rgba(206,32,41,0.2)]">
                            {menuItems[activeCategory].map((item) => (
                                <div 
                                    key={item.id}
                                    className="bg-white p-8 md:p-12 hover:bg-[#CE2029] group transition-all cursor-pointer relative"
                                    onClick={() => addToCart(item)}
                                >
                                    {item.note && (
                                        <div className="absolute top-4 right-4 bg-yellow-400 border-2 border-black px-2 py-1 text-[10px] font-black uppercase transform rotate-2 text-black">
                                            {item.note}
                                        </div>
                                    )}
                                    <div className="flex justify-between items-start mb-4 text-black">
                                        <h3 className="text-4xl font-black uppercase italic tracking-normal leading-none group-hover:text-white">
                                            {item.name}
                                        </h3>
                                        <span className="text-3xl font-black italic group-hover:text-white">S/ {item.price.toFixed(2)}</span>
                                    </div>
                                    <p className="font-bold text-sm uppercase opacity-60 group-hover:opacity-100 group-hover:text-white max-w-xs mb-8 text-black tracking-normal">
                                        {item.desc}
                                    </p>
                                    <div className="flex items-center space-x-2 text-[10px] font-black uppercase tracking-widest group-hover:text-white border-t-2 border-black group-hover:border-white pt-4 text-black">
                                        <span>Añadir al pedido</span>
                                        <Icon name="ChevronRight" size={14} />
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* SECCIÓN DE UBICACIÓN Y COBERTURA INTEGRADA */}
                    <section id="visitanos" className="max-w-7xl mx-auto px-4 py-20">
                        <div className="bg-[#1A1A1A] text-white grid grid-cols-1 md:grid-cols-2 border-8 border-black overflow-hidden relative">
                            <div className="absolute top-0 right-0 w-32 h-32 opacity-10 pointer-events-none bg-dots"></div>
                            
                            <div className="p-12 space-y-8 flex flex-col justify-center relative z-10">
                                <h3 className="text-6xl font-black uppercase italic tracking-normal leading-none text-white">
                                    ENCUÉNTRANOS<br/><span className="text-[#CE2029]">EN EL BARRIO</span>
                                </h3>
                                
                                <div className="space-y-6">
                                    <div className="flex items-start space-x-4">
                                        <Icon name="MapPin" size={32} className="text-[#CE2029] shrink-0" />
                                        <div>
                                            <p className="font-black text-xl uppercase italic text-white tracking-normal">Av. Retablo 191</p>
                                            <p className="font-bold opacity-60 uppercase text-xs tracking-widest">El Retablo, Comas - Lima</p>
                                        </div>
                                    </div>
                                    
                                    <div className="flex items-start space-x-4">
                                        <Icon name="Navigation" size={32} className="text-[#CE2029] shrink-0" />
                                        <div>
                                            <p className="font-black text-xl uppercase italic text-white tracking-normal leading-none">Horarios</p>
                                            <p className="font-bold opacity-60 uppercase text-xs tracking-widest text-white/80">Martes a Domingo de 6:30 PM a 11:00 PM</p>
                                        </div>
                                    </div>

                                    <div className="flex items-start space-x-4 border-t border-white/10 pt-4">
                                        <Icon name="Truck" size={32} className="text-[#CE2029] shrink-0" />
                                        <div>
                                            <p className="font-black text-xl uppercase italic text-white tracking-normal leading-none">COBERTURA DE ENVÍO</p>
                                            <p className="font-bold opacity-60 uppercase text-xs tracking-widest text-white/80">COMAS • LOS OLIVOS • CARABAYLLO</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex flex-col space-y-6 pt-4">
                                    <div className="flex items-center space-x-4">
                                        <a 
                                            href="https://www.instagram.com/gudboyburger/" 
                                            target="_blank" 
                                            rel="noopener noreferrer"
                                            className="bg-white text-black p-4 rounded-full hover:bg-[#CE2029] hover:text-white transition-all shadow-[4px_4px_0_rgba(0,0,0,1)] hover:translate-x-1 hover:translate-y-1 active:shadow-none"
                                        >
                                            <Icon name="Instagram" />
                                        </a>
                                        
                                        <a 
                                            href={whatsappDirectLink} 
                                            target="_blank" 
                                            rel="noopener noreferrer"
                                            className="text-white font-black uppercase text-sm tracking-[0.1em] hover:text-[#CE2029] transition-all underline underline-offset-4"
                                        >
                                            pide tu delivery dando click aquí
                                        </a>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="bg-[#CE2029] min-h-[400px] relative border-l-8 border-black flex flex-col items-center justify-center p-12 text-center overflow-hidden">
                                <div className="absolute inset-0 opacity-20 pointer-events-none bg-dots"></div>
                                <div className="relative z-10 space-y-6">
                                    <div className="bg-white border-4 border-black p-6 transform -rotate-2 shadow-[8px_8px_0_#1A1A1A]">
                                        <h4 className="text-black text-5xl font-black uppercase italic tracking-normal leading-none text-black">ENTRA ACÁ PARA <br/> VER LA UBI</h4>
                                    </div>
                                    <p className="text-white font-black uppercase text-sm tracking-widest bg-black px-4 py-1 inline-block">MIRA EL MAPA EXACTO EN TU CELULAR</p>
                                    <div className="pt-4">
                                        <a 
                                            href={googleMapsUrl}
                                            target="_blank" 
                                            rel="noopener noreferrer"
                                            className="inline-block bg-white text-black px-12 py-5 font-black uppercase italic text-2xl hover:scale-110 transition-transform shadow-[10px_10px_0_#1A1A1A] border-4 border-black text-black"
                                        >
                                            ABRIR EN MAPS
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* PANEL DEL CARRITO - Mensaje de confirmación dinámico */}
                    {isCartOpen && (
                        <div className="fixed inset-0 z-[100] flex justify-end">
                            <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={() => setIsCartOpen(false)}></div>
                            <div className="relative w-full max-w-lg bg-white h-full flex flex-col border-l-8 border-black">
                                <div className="p-8 border-b-8 border-black bg-black text-white flex justify-between items-center">
                                    <h2 className="text-4xl font-black italic uppercase tracking-normal text-white text-white">TU CUENTA<span className="text-[#CE2029]">.</span></h2>
                                    <button onClick={() => setIsCartOpen(false)} className="hover:rotate-90 transition-transform text-white">
                                        <Icon name="X" size={32} />
                                    </button>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto p-8 space-y-6 text-black" style={{ backgroundImage: 'linear-gradient(rgba(0,0,0,0.02) 1px, transparent 1px)', backgroundSize: '100% 2rem' }}>
                                    {cart.length === 0 ? (
                                        <div className="h-full flex flex-col items-center justify-center opacity-20">
                                            <span className="text-8xl mb-4 text-black font-black italic">🍟</span>
                                            <p className="text-2xl font-black uppercase italic tracking-widest text-black">Sin nada por ahora...</p>
                                        </div>
                                    ) : (
                                        cart.map(item => (
                                            <div key={item.id} className="flex justify-between items-center border-b-2 border-dashed border-black pb-4 text-black">
                                                <div className="flex-1 pr-4">
                                                    <h4 className="text-xl font-black uppercase italic tracking-normal leading-none text-black">{item.name}</h4>
                                                    <p className="font-bold text-[10px] uppercase opacity-50 mt-1 text-black text-black">Precio Unitario: S/ {item.price.toFixed(2)}</p>
                                                </div>
                                                <div className="flex items-center space-x-4">
                                                    <div className="flex items-center border-2 border-black bg-white px-2 py-1 text-black">
                                                        <button onClick={() => updateQty(item.id, -1)} className="hover:text-[#CE2029]"><Icon name="Minus" size={14} /></button>
                                                        <span className="mx-4 font-black text-lg text-black">{item.qty}</span>
                                                        <button onClick={() => updateQty(item.id, 1)} className="hover:text-[#CE2029]"><Icon name="Plus" size={14} /></button>
                                                    </div>
                                                    <button onClick={() => removeItem(item.id)} className="text-[#CE2029]"><Icon name="Trash2" size={20} /></button>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>

                                {cartTotal > 0 && (
                                    <div className="p-8 border-t-8 border-black bg-[#F5E6CA] text-black">
                                        <div className="flex justify-between items-end mb-6 text-black">
                                            <div>
                                                <p className="font-black uppercase text-[10px] tracking-widest opacity-60 text-black">Subtotal del pedido</p>
                                                <span className="text-5xl font-black italic tracking-normal text-black text-black">S/ {cartTotal.toFixed(2)}</span>
                                            </div>
                                            <Icon name="Flame" size={40} className="text-[#CE2029] fill-current" />
                                        </div>
                                        <button 
                                            onClick={handleConfirmOrder}
                                            className="w-full bg-[#CE2029] text-white py-6 text-2xl font-black uppercase italic hover:bg-black transition-all border-4 border-black shadow-[8px_8px_0_rgba(0,0,0,1)] active:translate-x-1 active:translate-y-1 active:shadow-none block text-center text-white"
                                        >
                                            CONFIRMAR POR WHATSAPP
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
